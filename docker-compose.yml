version: '3.9'
services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    working_dir: /app
    command: npm start
    ports:
      - '4000:4000'
    env_file:
      - .env
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app

  frontend:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - '5173:5173'
    volumes:
      - ./:/app
    environment:
      - VITE_API_BASE=http://localhost:4000
    depends_on:
      - backend

volumes:
  mongo_data:
